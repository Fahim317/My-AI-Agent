<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>My AI Agent</title>
<meta name="theme-color" content="#11131A" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #11131A;
    --surface: #1B1E29;
    --surface-2: #232733;
    --amber: #E8A33D;
    --teal: #3F7C7A;
    --text: #F2EFE9;
    --muted: #8A8D99;
    --error: #D1564B;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #14161F 0%, #11131A 100%);
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(14px + var(--safe-top)) 18px 14px;
    border-bottom: 1px solid #20232E;
    flex-shrink: 0;
  }
  .orb-wrap { width: 38px; height: 38px; position: relative; flex-shrink: 0; }
  .orb {
    width: 100%; height: 100%; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, var(--amber), var(--teal) 75%);
    box-shadow: 0 0 0 0 rgba(232,163,61,0.5);
    animation: pulse 3.2s ease-in-out infinite;
  }
  .orb.listening { animation: pulse 0.9s ease-in-out infinite; }
  .orb.thinking { animation: spin 1.1s linear infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,163,61,0.35); transform: scale(1); }
    50% { box-shadow: 0 0 0 8px rgba(232,163,61,0); transform: scale(1.05); }
  }
  @keyframes spin {
    0% { filter: hue-rotate(0deg) brightness(1); }
    50% { filter: hue-rotate(25deg) brightness(1.15); }
    100% { filter: hue-rotate(0deg) brightness(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .orb, .orb.listening, .orb.thinking { animation: none; }
  }
  .h-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; line-height: 1.1; }
  .h-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .icon-btn {
    margin-left: auto;
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid #2A2E3B;
    background: var(--surface);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
  }
  .icon-btn:focus-visible, button:focus-visible, input:focus-visible {
    outline: 2px solid var(--amber); outline-offset: 2px;
  }

  /* ---------- messages ---------- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .welcome {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    padding: 18px 16px;
    border: 1px dashed #2A2E3B;
    border-radius: 14px;
  }
  .bubble {
    max-width: 84%;
    padding: 11px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--amber);
    color: #1A1208;
    border-bottom-right-radius: 4px;
  }
  .bubble.model {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid #262A36;
    border-bottom-left-radius: 4px;
  }
  .bubble.error {
    align-self: flex-start;
    background: rgba(209,86,75,0.12);
    border: 1px solid rgba(209,86,75,0.4);
    color: #F3B6AE;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
  .tool-tag {
    align-self: flex-start;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--teal);
    letter-spacing: 0.02em;
  }
  .speak-btn {
    background: none; border: none; color: var(--muted);
    font-size: 12px; cursor: pointer; padding: 4px 0 0; text-align: left;
  }

  /* ---------- chips ---------- */
  #chips {
    display: flex; gap: 8px; padding: 0 14px 10px; overflow-x: auto;
    flex-shrink: 0;
  }
  .chip {
    flex-shrink: 0;
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid #2A2E3B;
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .chip:hover { color: var(--text); border-color: var(--amber); }

  /* ---------- input bar ---------- */
  #inputbar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px calc(12px + var(--safe-bottom));
    border-top: 1px solid #20232E;
    background: #14161F;
    flex-shrink: 0;
  }
  #text {
    flex: 1;
    resize: none;
    max-height: 110px;
    background: var(--surface);
    border: 1px solid #2A2E3B;
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    padding: 11px 14px;
    line-height: 1.4;
  }
  .round-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid #2A2E3B;
    background: var(--surface);
    color: var(--text);
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .round-btn.send { background: var(--amber); color: #1A1208; border: none; }
  .round-btn.mic.active { background: var(--error); color: white; border: none; }

  /* ---------- settings drawer ---------- */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  #overlay.open { display: flex; }
  #drawer {
    width: 100%; max-width: 720px;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 22px 20px calc(22px + var(--safe-bottom));
  }
  #drawer h3 { font-family: 'Fraunces', serif; margin: 0 0 4px; }
  #drawer p { color: var(--muted); font-size: 13px; margin: 0 0 14px; line-height: 1.5; }
  .sync-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .sync-row input {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.05em;
    background: var(--surface-2); border: 1px solid #2A2E3B; border-radius: 10px;
    color: var(--text); padding: 10px 12px;
  }
  .pill-btn {
    background: var(--surface-2); border: 1px solid #2A2E3B; color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer;
  }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid #2A2E3B; }
  .toggle-row span { font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="orb-wrap"><div class="orb" id="orb"></div></div>
    <div>
      <div class="h-title">My Agent</div>
      <div class="h-sub" id="status">ready</div>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
  </header>

  <div id="messages"></div>

  <div id="chips">
    <button class="chip" data-text="Web e search koro: ">🔍 Search the web</button>
    <button class="chip" data-text="Eta note kore rakho: ">📝 Save a note</button>
    <button class="chip" data-text="Amar shob saved notes dekhao">📋 Show my notes</button>
  </div>

  <div id="inputbar">
    <button class="round-btn mic" id="micBtn" aria-label="Voice input">🎙</button>
    <textarea id="text" rows="1" placeholder="Type or talk — any language…"></textarea>
    <button class="round-btn" id="speakerBtn" aria-label="Toggle voice reply">🔊</button>
    <button class="round-btn send" id="sendBtn" aria-label="Send">➤</button>
  </div>
</div>

<div id="overlay">
  <div id="drawer">
    <h3>Sync across devices</h3>
    <p>This code links your memory across phone and PC. Set the <strong>same code</strong> on every device to share notes and chat history.</p>
    <div class="sync-row">
      <input id="syncInput" />
      <button class="pill-btn" id="copyBtn">Copy</button>
    </div>
    <button class="pill-btn" id="saveSyncBtn">Use this code</button>
    <div class="toggle-row">
      <span>Speak replies aloud</span>
      <input type="checkbox" id="ttsToggle" />
    </div>
    <div class="toggle-row">
      <span>Voice input language</span>
      <select id="langSelect" class="pill-btn">
        <option value="en-US">English</option>
        <option value="bn-BD">বাংলা</option>
      </select>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const orb = $('orb');
const statusEl = $('status');

// ---------- identity / sync code ----------
function randomCode() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}
let userId = localStorage.getItem('agent_sync_code');
if (!userId) {
  userId = randomCode();
  localStorage.setItem('agent_sync_code', userId);
}

let history = JSON.parse(localStorage.getItem('agent_history') || '[]');
let ttsEnabled = localStorage.getItem('agent_tts') === '1';
let recogLang = localStorage.getItem('agent_lang') || 'en-US';

$('ttsToggle').checked = ttsEnabled;
$('langSelect').value = recogLang;
$('syncInput').value = userId;

// ---------- rendering ----------
function bnRange(str) { return /[\u0980-\u09FF]/.test(str); }

function speak(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = bnRange(text) ? 'bn-BD' : 'en-US';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function addBubble(role, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  if (role === 'model') {
    const btn = document.createElement('button');
    btn.className = 'speak-btn';
    btn.textContent = '🔊 play';
    btn.onclick = () => speak(text);
    messagesEl.appendChild(btn);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addError(text) {
  const div = document.createElement('div');
  div.className = 'bubble error';
  div.textContent = '⚠ ' + text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addToolTag(names) {
  if (!names || !names.length) return;
  const div = document.createElement('div');
  div.className = 'tool-tag';
  div.textContent = '→ used: ' + names.join(', ');
  messagesEl.appendChild(div);
}

function renderWelcomeIfEmpty() {
  if (history.length > 0) return;
  const div = document.createElement('div');
  div.className = 'welcome';
  div.textContent = "Hey! Ami tomar personal agent — joto language e likho/bolo, shei language e reply dibo. Bolo kichu search korte, note save korte, ba just kotha bolte. Mic chepe directly kotha o bolte parbo.";
  messagesEl.appendChild(div);
}

// ---------- load history (synced or local) ----------
async function loadHistory() {
  try {
    const r = await fetch('/api/history?userId=' + encodeURIComponent(userId));
    const data = await r.json();
    if (data.synced && Array.isArray(data.messages) && data.messages.length) {
      history = data.messages;
      localStorage.setItem('agent_history', JSON.stringify(history));
    }
  } catch (e) {
    // offline or not configured — fall back to local cache silently
  }
  renderWelcomeIfEmpty();
  history.forEach((m) => addBubble(m.role === 'model' ? 'model' : 'user', m.content));
}
loadHistory();

// ---------- sending ----------
function setStatus(state) {
  orb.className = 'orb' + (state ? ' ' + state : '');
  statusEl.textContent = state || 'ready';
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addBubble('user', text);
  history.push({ role: 'user', content: text });
  localStorage.setItem('agent_history', JSON.stringify(history.slice(-40)));
  $('text').value = '';
  setStatus('thinking');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(-20, -1), userId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    addToolTag(data.used);
    addBubble('model', data.reply);
    history.push({ role: 'model', content: data.reply });
    localStorage.setItem('agent_history', JSON.stringify(history.slice(-40)));
    speak(data.reply);
  } catch (e) {
    addError(e.message);
  } finally {
    setStatus('');
  }
}

$('sendBtn').onclick = () => sendMessage($('text').value);
$('text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage($('text').value);
  }
});
$('text').addEventListener('input', (e) => {
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 110) + 'px';
});

document.querySelectorAll('.chip').forEach((chip) => {
  chip.onclick = () => {
    const t = chip.dataset.text;
    $('text').value = t;
    $('text').focus();
    if (!t.endsWith(' ')) sendMessage(t);
  };
});

// ---------- voice input ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizing = false;
let recognizer = null;
if (SR) {
  recognizer = new SR();
  recognizer.continuous = false;
  recognizer.interimResults = false;
  recognizer.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    sendMessage(transcript);
  };
  recognizer.onend = () => { recognizing = false; $('micBtn').classList.remove('active'); setStatus(''); };
  recognizer.onerror = () => { recognizing = false; $('micBtn').classList.remove('active'); setStatus(''); };
} else {
  $('micBtn').style.display = 'none';
}

$('micBtn').onclick = () => {
  if (!recognizer) return;
  if (recognizing) { recognizer.stop(); return; }
  recognizer.lang = recogLang;
  recognizer.start();
  recognizing = true;
  $('micBtn').classList.add('active');
  setStatus('listening');
};

// ---------- speaker toggle (header drawer + quick toggle) ----------
$('speakerBtn').onclick = () => {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem('agent_tts', ttsEnabled ? '1' : '0');
  $('ttsToggle').checked = ttsEnabled;
  $('speakerBtn').style.opacity = ttsEnabled ? '1' : '0.4';
};
$('speakerBtn').style.opacity = ttsEnabled ? '1' : '0.4';

// ---------- settings drawer ----------
$('settingsBtn').onclick = () => $('overlay').classList.add('open');
$('overlay').onclick = (e) => { if (e.target.id === 'overlay') $('overlay').classList.remove('open'); };
$('copyBtn').onclick = () => { navigator.clipboard.writeText($('syncInput').value); $('copyBtn').textContent = 'Copied'; setTimeout(() => $('copyBtn').textContent = 'Copy', 1200); };
$('saveSyncBtn').onclick = () => {
  const v = $('syncInput').value.trim().toUpperCase();
  if (!v) return;
  userId = v;
  localStorage.setItem('agent_sync_code', userId);
  location.reload();
};
$('ttsToggle').onchange = (e) => {
  ttsEnabled = e.target.checked;
  localStorage.setItem('agent_tts', ttsEnabled ? '1' : '0');
  $('speakerBtn').style.opacity = ttsEnabled ? '1' : '0.4';
};
$('langSelect').onchange = (e) => {
  recogLang = e.target.value;
  localStorage.setItem('agent_lang', recogLang);
};

// ---------- PWA install + service worker ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
